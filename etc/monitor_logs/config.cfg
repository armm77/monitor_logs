# /etc/monitor_logs/config.cfg

# Base donde viven las regiones
cics_base=/var/cics_regions

# Lista explícita de CICS a monitorear (separada por comas)
cics_list=CICSFBAT,CICSFPR1

# Polling (ms). Recomendado 1000 en SAN, por debajo de 1000 afecta el rendimiento del almacenamiento
poll_ms=2000

# Tail desde EOF al iniciar (true/false)
start_from_eof=true

# Modo de copiado: all | include | exclude
copy_mode=include

# Códigos (separados por coma)
include_codes=ERZ030022E,ERZ014016E,ERZ014040E
exclude_codes=ERZ010075E,ERZ014048E

# Salidas
output_dir=/var/log/monitor_logs
output_tag=s21

# Rotación por líneas del output
rotate_lines=2000
rotate_max=999

# Log interno diario del daemon
daemon_log_dir=/var/log/monitor_logs
