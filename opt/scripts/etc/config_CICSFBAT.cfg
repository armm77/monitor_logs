[user]
PermissionsStartOnly=true
ExecStartPre=/usr/bin/install -d -m 0755 -o UCICS -g UCICS /var/cics_regions/%i
ExecStartPre=/usr/bin/install -d -m 0755 -o UCICS -g UCICS /opt/script/etc
ExecStartPre=/usr/bin/install -d -m 0755 -o UCICS -g UCICS /run/cics_console
RuntimeDirectory=cics_console
RuntimeDirectoryMode=0755

[paths]
BASE_DIR=/var/cics_regions/CICSFBAT/
REG_FILE=/var/cics_regions/CICSFBAT/system.reg
MSG_FILE=/var/cics_regions/CICSFBAT/console.msg

[timers]
MSG_INTERVAL_SECONDS=3
CONSOLE_INTERVAL_SECONDS=3
